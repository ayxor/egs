openapi: 3.0.3
info:
  title: Object Storage Service
  description: >
    Generic file storage service. Completely agnostic to content type.
    Accepts and serves any binary object.
    Accessible only by internal services (Composer, Video Editor) via API key.
  version: 1.0.0

servers:
  - url: http://object-storage:5000
    description: Internal service

security:
  - ApiKeyAuth: []

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key

  schemas:
    ObjectCreated:
      type: object
      properties:
        bucket:
          type: string
          example: universidade-aveiro
        key:
          type: string
          example: raw/abc123.mp4

    BucketCreated:
      type: object
      properties:
        bucket:
          type: string
          example: universidade-aveiro

    BucketListResponse:
      type: object
      properties:
        buckets:
          type: array
          items:
            type: string
          example: ["universidade-aveiro"]
        total:
          type: integer
          example: 1
        limit:
          type: integer
          example: 50
        offset:
          type: integer
          example: 0
        query:
          type: string
          example: ""

    ObjectListResponse:
      type: object
      properties:
        objects:
          type: array
          items:
            type: string
          example: ["raw/abc123.mp4"]
        total:
          type: integer
          example: 1
        limit:
          type: integer
          example: 50
        offset:
          type: integer
          example: 0
        query:
          type: string
          example: ""

    Error:
      type: object
      properties:
        error:
          type: string
          example: bucket or key not found

paths:

  /buckets:
    get:
      summary: List all buckets
      description: Returns a paginated list of all created buckets (namespaces), optionally filtered by a substring query.
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 50
          description: Max number of buckets to return.
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            default: 0
          description: Number of buckets to skip.
        - name: query
          in: query
          required: false
          schema:
            type: string
            default: ""
          description: Substring match for bucket names.
      responses:
        '200':
          description: A list of buckets
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BucketListResponse'

  /buckets/{bucket}:
    put:
      summary: Create a bucket
      description: Creates a new namespace (bucket) for organizing objects.
      parameters:
        - name: bucket
          in: path
          required: true
          schema:
            type: string
          example: universidade-aveiro
      responses:
        '201':
          description: Bucket created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BucketCreated'
        '409':
          description: Bucket already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    delete:
      summary: Delete a bucket
      description: Deletes a bucket and all its contents.
      parameters:
        - name: bucket
          in: path
          required: true
          schema:
            type: string
          example: universidade-aveiro
      responses:
        '204':
          description: Bucket deleted successfully
        '404':
          description: Bucket not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /objects/{bucket}:
    get:
      summary: List all objects in a bucket
      description: Returns a paginated list of object keys inside a given bucket, optionally filtered by a substring query.
      parameters:
        - name: bucket
          in: path
          required: true
          schema:
            type: string
          example: universidade-aveiro
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 50
          description: Max number of object keys to return.
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            default: 0
          description: Number of object keys to skip.
        - name: query
          in: query
          required: false
          schema:
            type: string
            default: ""
          description: Substring match for object keys.
      responses:
        '200':
          description: A list of object keys in the bucket
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ObjectListResponse'
        '404':
          description: Bucket not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    put:
      summary: Upload an object
      description: >
        Stores a binary object in the given bucket.
        Object key is provided via query parameter `key`.
      parameters:
        - name: bucket
          in: path
          required: true
          schema:
            type: string
          example: universidade-aveiro
        - name: key
          in: query
          required: true
          schema:
            type: string
          example: raw/abc123.mp4
      requestBody:
        required: true
        content:
          application/octet-stream:
            schema:
              type: string
              format: binary
      responses:
        '201':
          description: Object stored successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ObjectCreated'
        '400':
          description: Invalid bucket or key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    delete:
      summary: Delete an object
      description: Removes an object from the given bucket. Object key is provided via query parameter `key`.
      parameters:
        - name: bucket
          in: path
          required: true
          schema:
            type: string
          example: universidade-aveiro
        - name: key
          in: query
          required: true
          schema:
            type: string
          example: raw/abc123.mp4
      responses:
        '204':
          description: Object deleted successfully
        '400':
          description: Invalid bucket or key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Bucket or key not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /objects/{bucket}/{key}:
    get:
      summary: Download an object
      description: >
        Returns the raw bytes of the stored object.
        Supports optional HTTP Range requests for partial content (e.g. video streaming).
        If no Range header is provided, returns the full object.
      parameters:
        - name: bucket
          in: path
          required: true
          schema:
            type: string
          example: universidade-aveiro
        - name: key
          in: path
          required: true
          schema:
            type: string
          example: raw/abc123.mp4
        - name: Range
          in: header
          required: false
          schema:
            type: string
          description: Optional HTTP Range header for partial content requests
          example: bytes=0-1023
      responses:
        '200':
          description: Full object returned
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '206':
          description: Partial content returned (response to Range request)
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '404':
          description: Bucket or key not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

