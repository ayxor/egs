openapi: 3.0.3
info:
  title: IAM Service (Keycloak)
  description: >
    Identity and Access Management service provided by Keycloak.
    This specification documents only the endpoints consumed by the Composer.
    Keycloak is completely agnostic to the platform's business logic —
    it knows nothing about videos, courses, subjects, or tags.
    The Composer is the only service that communicates with Keycloak.
  version: 1.0.0

servers:
  - url: http://keycloak:8080
    description: Keycloak instance

components:
  securitySchemes:
    BearerServiceToken:
      type: http
      scheme: bearer
      description: >
        Service token obtained via grant_type: client_credentials.
        Different from a user JWT — this is an application-level credential
        with administrative permissions in Keycloak.

  schemas:
    TokenResponse:
      type: object
      properties:
        access_token:
          type: string
          description: >
            JWT containing at minimum: user_id, email, role, and institution.
            Used by the Composer to authorize all subsequent requests.
          example: eyJhbGciOiJSUzI1NiJ9...
        refresh_token:
          type: string
          example: eyJhbGciOiJIUzI1NiJ9...
        expires_in:
          type: integer
          description: Access token validity in seconds
          example: 3600

    ServiceTokenResponse:
      type: object
      properties:
        access_token:
          type: string
          description: >
            Service token with administrative permissions.
            Used by the Composer to create users in Keycloak.
          example: eyJhbGciOiJSUzI1NiJ9...

    UserRequest:
      type: object
      required: [email, credentials, attributes, enabled]
      properties:
        email:
          type: string
          format: email
          example: professor@ua.pt
        credentials:
          type: array
          items:
            type: object
            properties:
              type:
                type: string
                example: password
              value:
                type: string
                example: "..."
        attributes:
          type: object
          properties:
            role:
              type: string
              enum: [professor, student]
              example: professor
            institution:
              type: string
              example: universidade-aveiro
        enabled:
          type: boolean
          example: true

    JWKSResponse:
      type: object
      properties:
        keys:
          type: array
          description: >
            List of public keys in JWKS (JSON Web Key Set) format.
            The Composer fetches this once on startup and stores it in memory
            to validate JWTs locally on every subsequent request,
            without contacting Keycloak again.
          items:
            type: object

    Error:
      type: object
      properties:
        error:
          type: string

paths:

  /realms/{realm}/protocol/openid-connect/certs:
    get:
      summary: Get Keycloak public key (JWKS)
      description: >
        Returns the public key(s) used by Keycloak to sign JWTs, in JWKS format.
        Called by the Composer once on startup. The public key is stored in memory
        and used to validate JWT signatures locally on every incoming request,
        without making additional calls to Keycloak.
        Does not require authentication.
      parameters:
        - name: realm
          in: path
          required: true
          schema:
            type: string
          example: egs
      responses:
        '200':
          description: JWKS public key set
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JWKSResponse'

  /realms/{realm}/protocol/openid-connect/token:
    post:
      summary: Obtain a token
      description: >
        Single endpoint for all token operations. Behaviour is determined by grant_type.

        CASE 1 — User login (grant_type: password):
        Called by the Composer when a user logs in. Returns a JWT containing
        user_id, email, role, and institution.

        CASE 2 — Token refresh (grant_type: refresh_token):
        Called by the Composer when the user's access_token has expired.
        Returns a new access_token and refresh_token without requiring a new login.

        CASE 3 — Service authentication (grant_type: client_credentials):
        Called by the Composer before creating a new user. Returns a service token
        with administrative permissions. The client_secret is an application credential
        configured during Keycloak setup and provided to the Composer as an
        environment variable at startup.
      parameters:
        - name: realm
          in: path
          required: true
          schema:
            type: string
          example: egs
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - title: "Case 1: User login"
                  type: object
                  required: [grant_type, client_id, username, password]
                  properties:
                    grant_type:
                      type: string
                      enum: [password]
                    client_id:
                      type: string
                      example: egs-platform
                    username:
                      type: string
                      format: email
                      example: professor@ua.pt
                    password:
                      type: string
                      example: "..."
                - title: "Case 2: Token refresh"
                  type: object
                  required: [grant_type, client_id, refresh_token]
                  properties:
                    grant_type:
                      type: string
                      enum: [refresh_token]
                    client_id:
                      type: string
                      example: egs-platform
                    refresh_token:
                      type: string
                      example: eyJhbGciOiJIUzI1NiJ9...
                - title: "Case 3: Service authentication"
                  type: object
                  required: [grant_type, client_id, client_secret]
                  properties:
                    grant_type:
                      type: string
                      enum: [client_credentials]
                    client_id:
                      type: string
                      example: egs-platform
                    client_secret:
                      type: string
                      description: Application credential configured during Keycloak setup
                      example: "..."
      responses:
        '200':
          description: Token issued successfully
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/TokenResponse'
                  - $ref: '#/components/schemas/ServiceTokenResponse'
        '400':
          description: Invalid or expired refresh token (Case 2)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Invalid credentials (Cases 1 and 3)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /realms/{realm}/users:
    post:
      summary: Create a new user
      description: >
        Creates a new user in Keycloak with the given attributes.
        Requires a service token obtained via grant_type: client_credentials
        (Case 3 above) in the Authorization header.
        Called by the Composer during user registration flow.
      parameters:
        - name: realm
          in: path
          required: true
          schema:
            type: string
          example: egs
      security:
        - BearerServiceToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserRequest'
      responses:
        '201':
          description: User created successfully
        '409':
          description: User already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
