<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Notificação{% endblock %}</title>
  <style>
    body {
      margin: 0; padding: 0;
      background-color: #f4f4f7;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 16px;
      color: #333333;
    }
    .wrapper {
      width: 100%; max-width: 600px;
      margin: 32px auto;
      background-color: #ffffff;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .header {
      background-color: #1a1a2e;
      padding: 28px 40px;
      text-align: center;
    }
    .header h1 {
      margin: 0;
      color: #ffffff;
      font-size: 22px;
      letter-spacing: 1px;
    }
    .body {
      padding: 36px 40px;
      line-height: 1.7;
    }
    .body p { margin: 0 0 16px; }
    .highlight {
      display: inline-block;
      background-color: #eef2ff;
      border-left: 4px solid #4f46e5;
      padding: 10px 16px;
      border-radius: 4px;
      font-weight: bold;
      margin: 8px 0 20px;
    }
    .footer {
      background-color: #f4f4f7;
      padding: 20px 40px;
      text-align: center;
      font-size: 12px;
      color: #888888;
    }
    .footer a { color: #4f46e5; text-decoration: none; }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="header">
      <h1>{% block header_title %}Notificações{% endblock %}</h1>
    </div>
    <div class="body">
      {% block content %}{% endblock %}
    </div>
    <div class="footer">
      <p>Este email foi enviado automaticamente. Por favor, não responda.</p>
      <!-- Tracking pixel -->
      <img src="{{ tracking_pixel_url }}" width="1" height="1" style="display:none" alt="">
    </div>
  </div>
</body>
</html>
