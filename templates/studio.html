{% extends 'base.html' %}

{% block content %}
<section class="section-head">
  <div>
    <p class="eyebrow">Studio</p>
    <h1>My Videos</h1>
  </div>
</section>

<div id="studio-gate" class="gate-message warn hidden">Sign in as a professor to access the studio.</div>

<div class="studio-layout hidden" id="studio-content">
  <div class="card" style="padding: 0;">
    <table class="studio-table" style="width: 100%; border-collapse: collapse;">
      <thead>
        <tr>
          <th style="text-align: left; padding: 12px 16px; border-bottom: 1px solid var(--border);">Title</th>
          <th style="text-align: left; padding: 12px 16px; border-bottom: 1px solid var(--border);">Course</th>
          <th style="padding: 12px 16px; border-bottom: 1px solid var(--border);">Status</th>
          <th style="text-align: right; padding: 12px 16px; border-bottom: 1px solid var(--border);">Actions</th>
        </tr>
      </thead>
      <tbody id="studio-video-list">
        <tr><td colspan="4" style="padding: 24px; text-align: center;">Loading your videos...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<!-- Edit Modal -->
<div id="edit-modal" style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; align-items: center; justify-content: center;">
  <div class="card" style="width: 100%; max-width: 500px; padding: 24px;">
    <h2>Edit Video</h2>
    <form id="edit-form" class="form-grid" style="margin-top: 16px;">
      <input type="hidden" name="video_id" id="edit-video-id">
      <input name="title" id="edit-title" type="text" placeholder="Lecture title" required>
      <textarea name="description" id="edit-description" rows="3" placeholder="Short description"></textarea>
      <div class="two-col">
        <input name="course" id="edit-course" type="text" placeholder="Course">
        <input name="subject" id="edit-subject" type="text" placeholder="Subject">
      </div>
      <input name="tags" id="edit-tags" type="text" placeholder="Comma-separated tags">
      
      <div style="display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px;">
        <button type="button" class="button" onclick="closeEditModal()">Cancel</button>
        <button type="submit" class="button primary">Save Changes</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
