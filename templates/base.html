<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page_title }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='site.css') }}">
</head>
<body data-page="{{ page_name }}">
  <div class="bg-layer"></div>
  <header class="site-header">
    <div class="nav-wrap">
      <a class="brand" href="/">
        <span class="brand-mark">U</span>
        <span class="brand-text">
          <strong>UAStream</strong>
          <small>Academic Video Platform</small>
        </span>
      </a>

      <nav class="main-nav">
        <a href="/" class="nav-link{% if page_name == 'home' %} active{% endif %}">Home</a>
        <a href="/library" class="nav-link{% if page_name == 'library' %} active{% endif %}">Library</a>
        <a href="/upload" id="nav-upload" class="nav-link hidden{% if page_name == 'upload' %} active{% endif %}">Upload</a>
        <a href="/studio" id="nav-studio" class="nav-link hidden{% if page_name == 'studio' %} active{% endif %}">Studio</a>
      </nav>

      <form class="nav-search-form hidden" id="nav-search-form">
        <div class="nav-search-container">
          <input type="search" name="q" id="nav-search-input" placeholder="Search videos...">
          <button type="submit" class="nav-search-btn" aria-label="Search">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="8"></circle>
              <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
          </button>
        </div>
      </form>

      <div class="header-actions">
        <a class="button ghost" href="/auth/login" id="auth-link">Sign In</a>
        <a class="button primary" href="/auth#register" id="nav-register-link">Sign Up</a>
        <div class="session-chip" id="session-chip">Guest</div>
      </div>
    </div>
  </header>

  <main class="container page-content">
    {% block content %}{% endblock %}
  </main>

  <!-- Create Channel Modal -->
  <div id="channel-create-modal" style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 101; align-items: center; justify-content: center; backdrop-filter: blur(4px);">
    <div class="card" style="width: min(500px, 95vw); padding: 24px; box-shadow: var(--shadow);">
      <h2 style="font-family: 'Space Grotesk', sans-serif;">Create Course Channel</h2>
      <form id="create-channel-form" class="form-grid" style="margin-top: 16px;">
        <input name="name" id="new-channel-name" type="text" placeholder="Class name, e.g. Distributed Systems" required style="margin-bottom: 12px;">
        <textarea name="description" id="new-channel-description" rows="3" placeholder="Short course description" style="margin-bottom: 12px;"></textarea>
        <div class="two-col" style="margin-bottom: 16px;">
          <input name="course_code" id="new-channel-code" type="text" placeholder="Course Code, e.g. LEI-310">
          <select name="visibility" id="new-channel-visibility">
            <option value="public">🌐 Public (Searchable)</option>
            <option value="unlisted">🔗 Unlisted (Link access)</option>
            <option value="private">🔒 Private (Subscribers only)</option>
          </select>
        </div>
        
        <div style="display: flex; gap: 8px; justify-content: flex-end;">
          <button type="button" class="button" onclick="closeCreateChannelModal()">Cancel</button>
          <button type="submit" class="button primary">Create Channel</button>
        </div>
      </form>
    </div>
  </div>

  <div class="toast-stack" id="toast-stack"></div>

  <script>
    window.UASTREAM_CONFIG = {
      page: {{ page_name | tojson }},
      selectedVideoId: {{ selected_video_id | default('', true) | tojson }},
      services: {{ downstream_services | tojson }},
    };
  </script>
  <script src="{{ url_for('static', filename='app.js', v=11) }}"></script>
</body>
</html>
