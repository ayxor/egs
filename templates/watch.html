{% extends 'base.html' %}

{% block content %}
<section class="watch-layout">
  <article class="player-card card">
    <div class="player-frame" id="player-frame">
      <video id="watch-video" controls autoplay style="position: absolute; inset: 0; width: 100%; height: 100%; display: block; object-fit: contain; background: #000; z-index: 1;"></video>
      <div class="player-overlay" id="player-overlay" style="z-index: 2;">
        <p class="eyebrow">Now Watching</p>
        <h2 id="watch-title">Lecture</h2>
        <p id="watch-meta" class="lead">Professor · Subject · Course</p>
      </div>
    </div>

    <div class="watch-info">
      <div style="display: flex; justify-content: space-between; align-items: flex-start; gap: 16px;">
        <h3 id="watch-title-secondary" style="margin: 0; font-family: 'Space Grotesk', sans-serif;">Lecture title</h3>
        <span id="watch-views" class="muted" style="font-weight: 500; font-size: 0.9rem; white-space: nowrap; margin-top: 4px;">0 views</span>
      </div>
      <p id="watch-description" class="muted" style="margin-top: 8px;">Select a lecture from the right column.</p>
      <div class="watch-actions" style="margin-top: 16px;">
        <a class="button ghost" href="/library">Back to Library</a>
      </div>
    </div>
  </article>

  <aside class="recommend-card card">
    <div class="section-head compact">
      <div>
        <p class="eyebrow">Up Next</p>
        <h3>Recommended</h3>
      </div>
    </div>
    <div id="recommendations" class="recommend-list"></div>
  </aside>
</section>
{% endblock %}
