openapi: 3.0.3
info:
  title: Composer Service
  description: >
    The Composer is the single entry point of the platform for all external clients.
    It orchestrates all internal services (IAM, Object Storage, Video Editor, Notifications)
    and is the only component that communicates with other services.
    All endpoints except /auth/login and POST /users require a valid JWT in the
    Authorization header.
  version: 1.0.0

servers:
  - url: http://composer:8080
    description: Composer service

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: >
        JWT issued by Keycloak, obtained via POST /auth/login.
        Contains user_id, email, role, and institution.
        Must be included in all requests except /auth/login and POST /users.

  schemas:
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: professor@ua.pt
        password:
          type: string
          example: "..."

    TokenResponse:
      type: object
      properties:
        access_token:
          type: string
          example: eyJhbGciOiJSUzI1NiJ9...
        refresh_token:
          type: string
          example: eyJhbGciOiJIUzI1NiJ9...
        expires_in:
          type: integer
          example: 3600

    RefreshRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token:
          type: string
          example: eyJhbGciOiJIUzI1NiJ9...

    UserRequest:
      type: object
      required: [email, password, name, role, institution]
      properties:
        email:
          type: string
          format: email
          example: professor@ua.pt
        password:
          type: string
          example: "..."
        name:
          type: string
          example: Professor Diogo
        role:
          type: string
          enum: [professor, student]
          example: professor
        institution:
          type: string
          example: universidade-aveiro
        course:
          type: string
          description: Optional. A professor may not be associated with a specific course.
          example: MIECT

    UserCreated:
      type: object
      properties:
        user_id:
          type: string
          example: 7f3a1b...

    UserProfile:
      type: object
      properties:
        user_id:
          type: string
          example: 7f3a1b...
        email:
          type: string
          format: email
          example: professor@ua.pt
        name:
          type: string
          example: Professor Diogo
        role:
          type: string
          example: professor
        institution:
          type: string
          example: universidade-aveiro
        course:
          type: string
          example: MIECT

    VideoMetadata:
      type: object
      properties:
        video_id:
          type: string
          example: vid_9a2f3c...
        title:
          type: string
          example: Aula 1 - VHDL
        description:
          type: string
          example: Introdução ao VHDL
        tags:
          type: array
          items:
            type: string
          example: [VHDL, LSD]
        course:
          type: string
          example: MIECT
        subject:
          type: string
          example: LSD
        uploader_id:
          type: string
          example: 7f3a1b...
        created_at:
          type: string
          format: date-time
          example: 2024-03-01T10:00:00Z

    VideoWithStream:
      allOf:
        - $ref: '#/components/schemas/VideoMetadata'
        - type: object
          properties:
            stream_url:
              type: string
              description: >
                Temporary presigned URL for direct streaming from Object Storage.
                Generated on demand — only returned by GET /videos/{video_id},
                never by GET /videos (search/list).
              example: https://object-storage/objects/universidade-aveiro/processed/abc123.mp4?token=...

    VideoCreated:
      type: object
      properties:
        video_id:
          type: string
          example: vid_9a2f3c...

    JobAccepted:
      type: object
      properties:
        job_id:
          type: string
          example: job_7f3a1b

    VideoSearchResponse:
      type: object
      properties:
        total:
          type: integer
          example: 42
        limit:
          type: integer
          example: 25
        offset:
          type: integer
          example: 0
        results:
          type: array
          items:
            $ref: '#/components/schemas/VideoMetadata'

    Error:
      type: object
      properties:
        error:
          type: string
          example: forbidden

security:
  - BearerAuth: []

paths:

  /auth/login:
    post:
      summary: User login
      description: >
        Authenticates a user and returns a JWT.
        The Composer proxies this request to Keycloak — it does not store
        passwords or generate tokens.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/refresh:
    post:
      summary: Refresh access token
      description: >
        Renews an expired access token without requiring a new login.
        The Composer proxies this request to Keycloak.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: Token refreshed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '400':
          description: Invalid or expired refresh token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /users:
    post:
      summary: Register a new user
      description: >
        Creates a new user in Keycloak and stores their profile metadata
        in the Composer's internal database.
        Sends a welcome email asynchronously via the Notifications service.
        Does not require authentication.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserRequest'
      responses:
        '201':
          description: User created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserCreated'
        '400':
          description: Missing or invalid required fields
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: User already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /users/me:
    get:
      summary: Get current user profile
      description: Returns the profile of the authenticated user.
      responses:
        '200':
          description: User profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        '401':
          description: Missing or invalid JWT
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /videos:
    get:
      summary: Search and list videos
      description: >
        Returns videos belonging to the authenticated user's institution.
        Never returns videos from other institutions.
        The stream_url is NOT included in results — it is only generated
        on explicit request via GET /videos/{video_id}.
        Supports full-text search across title, description, and tags.
        Supports filtering by course and subject.
        Supports pagination via limit and offset.
      parameters:
        - name: q
          in: query
          required: false
          schema:
            type: string
          description: Search string. Matched against title, description, and tags.
          example: VHDL
        - name: course
          in: query
          required: false
          schema:
            type: string
          description: Filter by course.
          example: MIECT
        - name: subject
          in: query
          required: false
          schema:
            type: string
          description: Filter by subject.
          example: LSD
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 25
          description: Maximum number of results to return.
          example: 25
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            default: 0
          description: Number of results to skip (for pagination).
          example: 0
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VideoSearchResponse'
        '401':
          description: Missing or invalid JWT
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    post:
      summary: Upload a video (without processing)
      description: >
        Uploads a video without any Video Editor processing.
        Stores the raw file in Object Storage and saves metadata
        in the Composer's internal database.
        Sends an upload confirmation email asynchronously.
        Requires role: professor.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [title, tags, course, subject, file]
              properties:
                title:
                  type: string
                  example: Aula 1 - VHDL
                description:
                  type: string
                  example: Introdução ao VHDL
                tags:
                  type: array
                  items:
                    type: string
                  example: [VHDL, LSD]
                course:
                  type: string
                  example: MIECT
                subject:
                  type: string
                  example: LSD
                file:
                  type: string
                  format: binary
      responses:
        '201':
          description: Video uploaded successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VideoCreated'
        '400':
          description: Missing or invalid required fields
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Missing or invalid JWT
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: User is not a professor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /videos/process:
    post:
      summary: Upload a video with Video Editor processing
      description: >
        Uploads a video and submits it for processing by the Video Editor.
        Returns immediately with a job_id and opens an SSE stream for real-time
        progress updates.
        The video_id is only available in the final SSE event (status: done).
        Requires role: professor.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [title, tags, course, subject, operations, file]
              properties:
                title:
                  type: string
                  example: Aula 1 - VHDL
                description:
                  type: string
                  example: Introdução ao VHDL
                tags:
                  type: array
                  items:
                    type: string
                  example: [VHDL, LSD]
                course:
                  type: string
                  example: MIECT
                subject:
                  type: string
                  example: LSD
                operations:
                  type: array
                  items:
                    type: string
                  description: List of operations to apply. Passed to the Video Editor.
                  example: [watermark]
                file:
                  type: string
                  format: binary
      responses:
        '202':
          description: >
            Job accepted. SSE stream opened.
            Progress events follow in text/event-stream format:
              data: {"job_id": "...", "percent": 0, "status": "started"}
              data: {"job_id": "...", "percent": 50, "status": "processing"}
              data: {"job_id": "...", "percent": 100, "status": "done", "video_id": "..."}
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobAccepted'
        '400':
          description: Missing or invalid required fields
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Missing or invalid JWT
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: User is not a professor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /videos/{video_id}:
    get:
      summary: Get video metadata and streaming URL
      description: >
        Returns the metadata and a temporary presigned streaming URL for the video.
        The stream_url points directly to the Object Storage — the client streams
        the video directly without going through the Composer.
        Access is restricted to users of the same institution as the video.
      parameters:
        - name: video_id
          in: path
          required: true
          schema:
            type: string
          example: vid_9a2f3c...
      responses:
        '200':
          description: Video metadata and streaming URL
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VideoWithStream'
        '401':
          description: Missing or invalid JWT
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Video belongs to a different institution
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Video not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    delete:
      summary: Delete a video
      description: >
        Removes a video from Object Storage and deletes its metadata
        from the Composer's internal database.
        Only the professor who uploaded the video can delete it.
      parameters:
        - name: video_id
          in: path
          required: true
          schema:
            type: string
          example: vid_9a2f3c...
      responses:
        '204':
          description: Video deleted successfully
        '401':
          description: Missing or invalid JWT
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: User is not the uploader of this video
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Video not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
