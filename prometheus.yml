global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: 'traefik'
    static_configs:
      - targets: ['traefik:8082']

  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']

  - job_name: 'video-editor'
    static_configs:
      - targets: ['video-editor:8080']

  - job_name: 'notifications'
    static_configs:
      - targets: ['notifications:8080']
