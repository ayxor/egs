apiVersion: apps/v1
kind: Deployment
metadata:
  name: object-storage
  namespace: tenant-grupo8-egs-deti-ua-pt
  labels:
    app: object-storage
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: object-storage
  template:
    metadata:
      labels:
        app: object-storage
    spec:
      containers:
        - name: object-storage
          image: registry.deti/tenant-grupo8-egs-deti-ua-pt/object-storage:v1
          imagePullPolicy: Always
          env:
            - name: OBJECT_STORAGE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: uastream-secrets
                  key: OBJECT_STORAGE_API_KEY
            - name: VAULT_ADDR
              value: http://vault:8200
            - name: VAULT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: uastream-secrets
                  key: VAULT_TOKEN
            - name: OBJECT_STORAGE_DATA_DIR
              value: /data
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: object-storage-data
              mountPath: /data
      volumes:
        - name: object-storage-data
          persistentVolumeClaim:
            claimName: object-storage-claim
---
apiVersion: v1
kind: Service
metadata:
  name: object-storage
  namespace: tenant-grupo8-egs-deti-ua-pt
spec:
  ports:
    - port: 8080
      targetPort: 8080
  selector:
    app: object-storage
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: video-editor
  namespace: tenant-grupo8-egs-deti-ua-pt
  labels:
    app: video-editor
spec:
  replicas: 1
  selector:
    matchLabels:
      app: video-editor
  template:
    metadata:
      labels:
        app: video-editor
    spec:
      containers:
        - name: video-editor
          image: registry.deti/tenant-grupo8-egs-deti-ua-pt/video-editor:v1
          env:
            - name: VIDEO_EDITOR_API_KEY
              valueFrom:
                secretKeyRef:
                  name: uastream-secrets
                  key: VIDEO_EDITOR_API_KEY
            - name: VAULT_ADDR
              value: http://vault:8200
            - name: VAULT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: uastream-secrets
                  key: VAULT_TOKEN
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2"
              memory: "4Gi"
          volumeMounts:
            - name: scratch-volume
              mountPath: /tmp
      volumes:
        - name: scratch-volume
          emptyDir:
            sizeLimit: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: video-editor
  namespace: tenant-grupo8-egs-deti-ua-pt
  annotations:
    traefik.ingress.kubernetes.io/service.sticky.cookie: "true"
    traefik.ingress.kubernetes.io/service.sticky.cookie.name: "video_editor_affinity"
spec:
  ports:
    - port: 8080
      targetPort: 8080
  selector:
    app: video-editor
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notifications
  namespace: tenant-grupo8-egs-deti-ua-pt
  labels:
    app: notifications
spec:
  replicas: 2
  selector:
    matchLabels:
      app: notifications
  template:
    metadata:
      labels:
        app: notifications
    spec:
      containers:
        - name: notifications
          image: registry.deti/tenant-grupo8-egs-deti-ua-pt/notifications:v1
          imagePullPolicy: Always
          env:
            - name: NOTIFICATIONS_API_KEY
              valueFrom:
                secretKeyRef:
                  name: uastream-secrets
                  key: NOTIFICATIONS_API_KEY
            - name: NOTIFICATIONS_BASE_URL
              value: http://notifications:8080
            - name: DATABASE_URL
              value: postgresql://composer:composer@db:5432/notifications
            - name: VAULT_ADDR
              value: http://vault:8200
            - name: VAULT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: uastream-secrets
                  key: VAULT_TOKEN
            - name: SMTP_HOST
              value: "smtp.gmail.com"
            - name: SMTP_PORT
              value: "587"
            - name: SMTP_USER
              valueFrom:
                secretKeyRef:
                  name: uastream-secrets
                  key: SMTP_USER
            - name: SMTP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: uastream-secrets
                  key: SMTP_PASSWORD
            - name: SMTP_FROM
              valueFrom:
                secretKeyRef:
                  name: uastream-secrets
                  key: SMTP_FROM
            - name: SMTP_USE_TLS
              value: "true"
            - name: SMTP_USE_SSL
              value: "false"
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: notifications
  namespace: tenant-grupo8-egs-deti-ua-pt
spec:
  ports:
    - port: 8080
      targetPort: 8080
  selector:
    app: notifications
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: object-storage-claim
  namespace: tenant-grupo8-egs-deti-ua-pt
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
