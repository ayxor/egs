apiVersion: apps/v1
kind: Deployment
metadata:
  name: notifications
  namespace: tenant-grupo8-egs-deti-ua-pt
  labels:
    app: notifications
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notifications
  template:
    metadata:
      labels:
        app: notifications
    spec:
      containers:
        - name: notifications
          image: registry.deti/tenant-grupo8-egs-deti-ua-pt/notifications:v1
          imagePullPolicy: Always
          env:
            - name: NOTIFICATIONS_API_KEY
              valueFrom:
                secretKeyRef:
                  name: uastream-secrets
                  key: NOTIFICATIONS_API_KEY
            - name: NOTIFICATIONS_BASE_URL
              value: http://notifications:8080
            - name: DATABASE_URL
              value: sqlite:////app/notifications.db
            - name: VAULT_ADDR
              value: http://vault:8200
            - name: VAULT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: uastream-secrets
                  key: VAULT_TOKEN
            - name: SMTP_HOST
              value: "smtp.gmail.com"
            - name: SMTP_PORT
              value: "587"
            - name: SMTP_USER
              value: "egsnotificationsservice@gmail.com"
            - name: SMTP_PASSWORD
              value: "thockzhzntwjcaxe"
            - name: SMTP_FROM
              value: "egsnotificationsservice@gmail.com"
            - name: SMTP_USE_TLS
              value: "true"
            - name: SMTP_USE_SSL
              value: "false"
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: notifications
  namespace: tenant-grupo8-egs-deti-ua-pt
spec:
  ports:
    - port: 8080
      targetPort: 8080
  selector:
    app: notifications
