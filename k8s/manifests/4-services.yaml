apiVersion: apps/v1
kind: Deployment
metadata:
  name: object-storage
  namespace: tenant-grupo8-egs-deti-ua-pt
  labels:
    app: object-storage
spec:
  replicas: 1
  selector:
    matchLabels:
      app: object-storage
  template:
    metadata:
      labels:
        app: object-storage
    spec:
      containers:
        - name: object-storage
          image: registry.deti/tenant-grupo8-egs-deti-ua-pt/object-storage:v1
          imagePullPolicy: Always
          env:
            - name: OBJECT_STORAGE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: uastream-secrets
                  key: OBJECT_STORAGE_API_KEY
            - name: VAULT_ADDR
              value: http://vault:8200
            - name: VAULT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: uastream-secrets
                  key: VAULT_TOKEN
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: object-storage
  namespace: tenant-grupo8-egs-deti-ua-pt
spec:
  ports:
    - port: 8080
      targetPort: 8080
  selector:
    app: object-storage
---
