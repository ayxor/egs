openapi: 3.0.3
info:
  title: Video Editor Service
  description: >
    Generic media processing service. Receives a resource via URL, applies
    requested operations, and delivers the result to a destination URL.
    Accessible only by internal services via API key.
  version: 1.0.0

servers:
  - url: http://video-editor:8080
    description: Internal service

security:
  - ApiKeyAuth: []

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key

  schemas:
    JobRequest:
      type: object
      required: [src_url, dst_url, operations]
      properties:
        src_url:
          type: string
          description: HTTP URL from which the service fetches the source file.
          example: https://storage/raw/abc123.mp4
        dst_url:
          type: string
          description: HTTP URL to which the service uploads the processed file.
          example: https://storage/processed/abc123.mp4
        progress_url:
          type: string
          description: Optional callback URL for progress notifications.
          example: https://composer/internal/jobs/progress
        operations:
          type: array
          description: Ordered list of operations to apply.
          items:
            type: object
            required: [type]
            properties:
              type:
                type: string
                example: watermark
              params:
                type: object
                description: Operation-specific parameters.
                example:
                  text: UA
                  position: bottom-right
                  opacity: 0.8

    JobCreated:
      type: object
      properties:
        job_id:
          type: string
          example: job_7f3a1b

    JobStatus:
      type: object
      properties:
        job_id:
          type: string
          example: job_7f3a1b
        status:
          type: string
          enum: [queued, processing, done, failed, cancelled]
          example: processing
        percent:
          type: integer
          minimum: 0
          maximum: 100
          example: 45
        created_at:
          type: string
          format: date-time
          example: 2026-03-17T10:00:00Z
        updated_at:
          type: string
          format: date-time
          example: 2026-03-17T10:01:23Z

    OperationList:
      type: object
      properties:
        operations:
          type: array
          items:
            type: object
            properties:
              type:
                type: string
                example: watermark
              params:
                type: array
                items:
                  type: string
                example: [text, position, opacity]

    JobOperations:
      type: object
      properties:
        operations:
          type: array
          items:
            type: object
            properties:
              type:
                type: string
                example: watermark
              params:
                type: object

    Error:
      type: object
      properties:
        error:
          type: string
          example: job not found

paths:
  /jobs:
    post:
      summary: Create a processing job
      description: >
        Accepts a processing request and starts the job asynchronously.
        Returns immediately with a job_id.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JobRequest'
      responses:
        '202':
          description: Job accepted and started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobCreated'
        '400':
          description: Missing or invalid required fields
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Missing or invalid API key
        '422':
          description: Unknown or unsupported operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /jobs/operations:
    get:
      summary: List supported operations
      responses:
        '200':
          description: Supported operations
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OperationList'
        '401':
          description: Missing or invalid API key

  /jobs/{job_id}:
    get:
      summary: Get job status
      parameters:
        - name: job_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Job status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobStatus'
        '401':
          description: Missing or invalid API key
        '404':
          description: Job not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    put:
      summary: Create or replace a processing job with a fixed id
      description: >
        Creates a new job with the provided job_id, or replaces an existing one.
        This enables idempotent orchestration from upstream services.
      parameters:
        - name: job_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JobRequest'
      responses:
        '202':
          description: Job accepted and started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobCreated'
        '400':
          description: Missing or invalid required fields
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Missing or invalid API key
        '422':
          description: Unknown or unsupported operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    delete:
      summary: Cancel a job
      description: >
        Cancels a queued or processing job. Terminal jobs remain unchanged.
      parameters:
        - name: job_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Job cancellation accepted
        '401':
          description: Missing or invalid API key
        '404':
          description: Job not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /jobs/{job_id}/operations:
    get:
      summary: Get operations for a specific job
      parameters:
        - name: job_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Operations requested for this job
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobOperations'
        '401':
          description: Missing or invalid API key
        '404':
          description: Job not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /jobs/{job_id}/progress:
    get:
      summary: Stream job progress via SSE
      parameters:
        - name: job_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: SSE stream opened
          content:
            text/event-stream:
              schema:
                type: string
        '401':
          description: Missing or invalid API key
        '404':
          description: Job not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
