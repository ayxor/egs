openapi: 3.0.3
info:
  title: Video Editor Service
  description: >
    Generic media processing service. Receives an uploaded source file, applies
    requested operations, and delivers the result to a destination URL.
    Accessible only by internal services via API key.
  version: 1.0.0

servers:
  - url: http://video-editor:8080
    description: Internal service

security:
  - ApiKeyAuth: []

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key

  schemas:
    JobOperation:
      type: object
      required: [type]
      properties:
        type:
          type: string
          example: watermark
        params:
          type: object
          description: Operation-specific parameters.
          example:
            text: UA
            position: bottom-right
            opacity: 0.8

    JobCreateRequest:
      type: object
      required: [file, dst_url, operations]
      properties:
        file:
          type: string
          format: binary
          description: Source file uploaded by the caller.
        dst_url:
          type: string
          description: HTTP URL to which the service uploads the processed file.
          example: https://storage/processed/abc123.mp4
        progress_url:
          type: string
          description: Optional callback URL for progress notifications.
          example: https://composer/internal/jobs/progress
        operations:
          type: string
          description: JSON-encoded array of operations to apply.
          example: '[{"type":"watermark","params":{"text":"UA","position":"bottom-right","opacity":0.8}}]'


    JobCreated:
      type: object
      properties:
        job_id:
          type: string
          example: job_7f3a1b

    JobProgress:
      type: object
      properties:
        percent:
          type: integer
          minimum: 0
          maximum: 100
          example: 45

    JobStatus:
      type: object
      properties:
        job_id:
          type: string
          example: job_7f3a1b
        status:
          type: string
          enum: [queued, processing, done, failed, cancelled]
          example: processing
        percent:
          type: integer
          minimum: 0
          maximum: 100
          example: 45
        progress:
          $ref: '#/components/schemas/JobProgress'
        operations:
          type: array
          items:
            $ref: '#/components/schemas/JobOperation'
        source_ref:
          type: string
          example: upload://my-video.mp4
        source_file_name:
          type: string
          nullable: true
          example: my-video.mp4
        source_file_mime_type:
          type: string
          nullable: true
          example: video/mp4
        created_at:
          type: string
          format: date-time
          example: 2026-03-17T10:00:00Z
        updated_at:
          type: string
          format: date-time
          example: 2026-03-17T10:01:23Z

    OperationList:
      type: object
      properties:
        operations:
          type: array
          items:
            type: object
            properties:
              type:
                type: string
                example: watermark
              params:
                type: array
                items:
                  type: string
                example: [text, position, opacity]


    Error:
      type: object
      properties:
        error:
          type: string
          example: job not found
        details:
          type: string
          nullable: true
          example: unable to open database file

paths:

  /jobs:
    post:
      summary: Create a processing job
      description: >
        Accepts an uploaded source file and starts the job asynchronously.
        Returns immediately with a job_id generated by the service.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/JobCreateRequest'
      responses:
        '202':
          description: Job accepted and started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobCreated'
        '400':
          description: Missing or invalid required fields
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Missing or invalid API key

  /jobs/operations:
    get:
      summary: List supported operations
      responses:
        '200':
          description: Supported operations
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OperationList'
        '401':
          description: Missing or invalid API key

  /jobs/{job_id}:
    get:
      summary: Get job status
      parameters:
        - name: job_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Job status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobStatus'
        '401':
          description: Missing or invalid API key
        '404':
          description: Job not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
