openapi: 3.0.3
info:
  title: Video Editor Service
  description: >
    Generic media processing service. Receives a resource via URL, applies
    the requested operations, and delivers the result to a destination URL.
    Completely agnostic to business logic — does not know about users, institutions,
    or any other service. All URLs are provided by the Composer at request time,
    guaranteeing total loose coupling.
    Accessible only by internal services via API key.
  version: 1.0.0

servers:
  - url: http://video-editor:8080
    description: Internal service

security:
  - ApiKeyAuth: []

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key

  schemas:
    JobRequest:
      type: object
      required: [src_url, dst_url, operations]
      properties:
        src_url:
          type: string
          description: >
            HTTP URL from which the Video Editor will fetch the source file (GET).
            Provided by the Composer — can point to the Object Storage, the Composer
            itself, or any other system. The Video Editor does not know or care.
          example: https://object-storage/objects/universidade-aveiro/raw/abc123.mp4?token=...
        dst_url:
          type: string
          description: >
            HTTP URL to which the Video Editor will deliver the processed file (PUT).
            Provided by the Composer — typically a presigned PUT URL for the Object Storage.
          example: https://object-storage/objects/universidade-aveiro/processed/abc123.mp4?token=...
        progress_url:
          type: string
          description: >
            Optional HTTP URL to which the Video Editor will POST progress updates via SSE.
            Provided by the Composer. If omitted, progress can still be polled via
            GET /jobs/{job_id}.
          example: https://composer/internal/jobs/progress
        operations:
          type: array
          description: >
            List of operations to apply to the source file, in order.
            The exact structure of each operation is defined by the implementation.
          items:
            type: object
            required: [type]
            properties:
              type:
                type: string
                example: watermark
              params:
                type: object
                description: Operation-specific parameters.
                example:
                  text: UA
                  position: bottom-right
                  opacity: 0.8

    JobCreated:
      type: object
      properties:
        job_id:
          type: string
          example: job_7f3a1b

    JobStatus:
      type: object
      properties:
        job_id:
          type: string
          example: job_7f3a1b
        status:
          type: string
          enum: [queued, processing, done, failed]
          example: processing
        percent:
          type: integer
          minimum: 0
          maximum: 100
          example: 45
        created_at:
          type: string
          format: date-time
          example: 2024-03-01T10:00:00Z
        updated_at:
          type: string
          format: date-time
          example: 2024-03-01T10:01:23Z

    JobOperations:
      type: object
      properties:
        operations:
          type: array
          items:
            type: object
            properties:
              type:
                type: string
                example: watermark
              params:
                type: array
                items:
                  type: string
                example: [text, position, opacity]

    OperationList:
      type: object
      properties:
        operations:
          type: array
          items:
            type: object
            properties:
              type:
                type: string
                example: watermark
              params:
                type: array
                items:
                  type: string
                example: [text, position, opacity]

    Error:
      type: object
      properties:
        error:
          type: string
          example: job not found

paths:

  /jobs:
    post:
      summary: Create a processing job
      description: >
        Accepts a processing request and starts the job asynchronously.
        Responds immediately with a job_id.
        Progress can be tracked via SSE (GET /jobs/{job_id}/progress)
        or polling (GET /jobs/{job_id}).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JobRequest'
      responses:
        '202':
          description: Job accepted and started (asynchronous)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobCreated'
        '400':
          description: Missing or invalid required fields
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: Unknown or unsupported operation type
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /jobs/{job_id}:
    get:
      summary: Get job status
      description: >
        Returns the current status and progress of a job.
        Alternative to SSE for contexts where streaming is not viable.
      parameters:
        - name: job_id
          in: path
          required: true
          schema:
            type: string
          example: job_7f3a1b
      responses:
        '200':
          description: Job status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobStatus'
        '404':
          description: Job not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /jobs/{job_id}/progress:
    get:
      summary: Stream job progress via SSE
      description: >
        Opens a Server-Sent Events stream that emits real-time progress updates
        for the given job. The Composer subscribes to this stream and retransmits
        progress to the client.
        The stream closes automatically when the job reaches status "done" or "failed".
      parameters:
        - name: job_id
          in: path
          required: true
          schema:
            type: string
          example: job_7f3a1b
      responses:
        '200':
          description: SSE stream opened
          content:
            text/event-stream:
              schema:
                type: string
              example: |
                data: {"job_id": "job_7f3a1b", "percent": 0, "status": "started"}

                data: {"job_id": "job_7f3a1b", "percent": 45, "status": "processing"}

                data: {"job_id": "job_7f3a1b", "percent": 100, "status": "done"}
        '404':
          description: Job not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /jobs/operations:
    get:
      summary: List supported operations
      description: >
        Returns the list of operations this service supports,
        along with their available parameters.
        Useful for the Composer to discover capabilities at runtime.
      responses:
        '200':
          description: Supported operations
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OperationList'

  /jobs/{job_id}/operations:
    get:
      summary: Get operations of a specific job
      description: >
        Returns the operations that were requested for a specific job,
        along with their parameters.
        Useful for inspecting what processing was applied to a given resource.
      parameters:
        - name: job_id
          in: path
          required: true
          schema:
            type: string
          example: job_7f3a1b
      responses:
        '200':
          description: Operations applied to the job
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobOperations'
        '404':
          description: Job not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
