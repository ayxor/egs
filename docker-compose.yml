services:
  # ---------------------------------------------------------------------------
  # Composer database (PostgreSQL)
  # ---------------------------------------------------------------------------
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: composer
      POSTGRES_PASSWORD: composer
      POSTGRES_DB: composer
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U composer"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ---------------------------------------------------------------------------
  # Keycloak database (PostgreSQL — separate instance for isolation)
  # ---------------------------------------------------------------------------
  kc-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak
      POSTGRES_DB: keycloak
    volumes:
      - kc-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ---------------------------------------------------------------------------
  # Keycloak IAM service
  # ---------------------------------------------------------------------------
  keycloak:
    image: quay.io/keycloak/keycloak:26.1
    command: ["start-dev", "--import-realm"]
    environment:
      # Admin credentials (change in production)
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin

      # Backing database
      KC_DB: postgres
      KC_DB_URL: "jdbc:postgresql://kc-db:5432/keycloak"
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak

      # HTTP
      KC_HTTP_PORT: "8080"
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
    ports:
      - "8180:8080"
    volumes:
      - ./keycloak/realm-egs.json:/opt/keycloak/data/import/realm-egs.json:ro
      - ./keycloak/themes/uastream:/opt/keycloak/themes/uastream:ro
    depends_on:
      kc-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/realms/egs/.well-known/openid-configuration || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Composer
  # ---------------------------------------------------------------------------
  composer:
    build: .
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://composer:composer@db:5432/composer"

      # Keycloak / IAM
      KEYCLOAK_URL: "http://keycloak:8080"
      KEYCLOAK_REALM: "egs"
      KEYCLOAK_CLIENT_ID: "egs-platform"
      KEYCLOAK_CLIENT_SECRET: "${KEYCLOAK_CLIENT_SECRET}"

      # Internal services
      OBJECT_STORAGE_URL: "http://object-storage:8080"
      OBJECT_STORAGE_API_KEY: "${OBJECT_STORAGE_API_KEY}"
      VIDEO_EDITOR_URL: "http://video-editor:8080"
      VIDEO_EDITOR_API_KEY: "${VIDEO_EDITOR_API_KEY}"
      NOTIFICATIONS_URL: "http://notifications:8080"
      NOTIFICATIONS_API_KEY: "${NOTIFICATIONS_API_KEY}"

      COMPOSER_BASE_URL: "http://composer:8080"

volumes:
  pgdata:
  kc-pgdata:
