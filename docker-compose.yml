services:

  # ---------------------------------------------------------------------------
  # Traefik — API Gateway e Reverse Proxy
  # ---------------------------------------------------------------------------
  traefik:
    image: traefik:v2.11
    environment:
      - DOCKER_API_VERSION=1.41
    depends_on:
      keycloak:
        condition: service_started
      composer:
        condition: service_started
    ports:
      - "80:80"        # Tráfego HTTP público (uastream.com)
      - "8080:8080"    # Dashboard Traefik (só em desenvolvimento)
      - "8082:8082"    # Métricas Prometheus do Traefik
    volumes:
      - ./traefik.yml:/etc/traefik/traefik.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro   # Traefik lê labels dos containers
    networks:
      - public-net     # Única rede com acesso ao exterior
      - services-net   # Acesso privado pelo Prometheus para raspar métricas
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Composer database (PostgreSQL)
  # ---------------------------------------------------------------------------
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: composer
      POSTGRES_PASSWORD: composer
      POSTGRES_DB: composer
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - composer-db-net   # Isolada — só db e composer aqui
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U composer"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ---------------------------------------------------------------------------
  # Keycloak database (PostgreSQL)
  # ---------------------------------------------------------------------------
  kc-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak
      POSTGRES_DB: keycloak
    volumes:
      - kc-pgdata:/var/lib/postgresql/data
    networks:
      - keycloak-db-net   # Isolada — só kc-db e keycloak aqui
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ---------------------------------------------------------------------------
  # Keycloak IAM service
  # ---------------------------------------------------------------------------
  keycloak:
    image: quay.io/keycloak/keycloak:26.1
    command: ["start-dev", "--import-realm"]
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL: "jdbc:postgresql://kc-db:5432/keycloak"
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
      KC_HTTP_PORT: "8080"
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      KC_HEALTH_ENABLED: "true"
    volumes:
      - ../iam/keycloak/realm-egs.json:/opt/keycloak/data/import/realm-egs.json:ro
      - ../iam/keycloak/themes/uastream:/opt/keycloak/themes/uastream:ro
    networks:
      - keycloak-db-net   # Fala com kc-db
      - backend-net        # Fala com composer (tokens, JWKS)
      - public-net         # Exposto via Traefik para o auth callback do browser
    depends_on:
      kc-db:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=main_public-net"
      - "traefik.http.routers.keycloak.rule=Host(`uastream.com`) && PathPrefix(`/realms`, `/resources`, `/js`)"
      - "traefik.http.routers.keycloak.entrypoints=web"
      - "traefik.http.services.keycloak.loadbalancer.server.port=8080"

  # ---------------------------------------------------------------------------
  # Composer — orquestrador central e único ponto de entrada da API/frontend
  # ---------------------------------------------------------------------------
  composer:
    build:
      context: ../composer
    networks:
      - public-net         # Exposto via Traefik
      - composer-db-net    # Fala com db
      - backend-net        # Fala com keycloak
      - services-net       # Fala com object-storage, video-editor, notifications
    depends_on:
      db:
        condition: service_healthy
      keycloak:
        condition: service_started
      object-storage:
        condition: service_started
      video-editor:
        condition: service_started
      notifications:
        condition: service_started
    environment:
      DATABASE_URL: "postgresql://composer:composer@db:5432/composer"
      KEYCLOAK_URL: "http://keycloak:8080"
      # KEYCLOAK_PUBLIC_URL: URL que o *browser* usa para o redirect OAuth.
      # Com Traefik, o browser vai a uastream.com (não a localhost).
      KEYCLOAK_PUBLIC_URL: "http://uastream.com"
      KEYCLOAK_REALM: "egs"
      KEYCLOAK_CLIENT_ID: "egs-platform"
      KEYCLOAK_CLIENT_SECRET: "change-me-in-production"
      OBJECT_STORAGE_URL: "http://object-storage:8080"
      OBJECT_STORAGE_API_KEY: "stub-api-key"
      VIDEO_EDITOR_URL: "http://video-editor:8080"
      VIDEO_EDITOR_API_KEY: "stub-api-key"
      NOTIFICATIONS_URL: "http://notifications:8080"
      NOTIFICATIONS_API_KEY: "stub-api-key"
      # O video-editor vai fazer callback para o composer via esta URL interna
      COMPOSER_BASE_URL: "http://composer:8080"
      VAULT_ADDR: "http://vault:8200"
      VAULT_TOKEN: "token-composer"
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=main_public-net"
      # Rota principal — tudo o que não encaixar nas outras rotas vai para o composer
      - "traefik.http.routers.composer.rule=Host(`uastream.com`)"
      - "traefik.http.routers.composer.entrypoints=web"
      - "traefik.http.services.composer.loadbalancer.server.port=8080"
      # Bloquear /internal/* ao exterior — esta rota tem prioridade mais alta (priority=10)
      # e devolve 403 para qualquer pedido a /internal/ vindo de fora
      - "traefik.http.routers.composer-internal-block.rule=Host(`uastream.com`) && PathPrefix(`/internal`)"
      - "traefik.http.routers.composer-internal-block.entrypoints=web"
      - "traefik.http.routers.composer-internal-block.priority=10"
      - "traefik.http.routers.composer-internal-block.middlewares=block-internal"
      - "traefik.http.middlewares.block-internal.ipallowlist.sourcerange=0.0.0.0/0"
      # Nota: na prática, o middleware acima não bloqueia por si só.
      # A forma correcta é usar um middleware de returncode — ver nota no README.

  # ---------------------------------------------------------------------------
  # Object Storage Stub
  # ---------------------------------------------------------------------------
  object-storage:
    build:
      context: ../object-storage
    networks:
      - services-net   # Fala com composer e video-editor
      - public-net     # Exposto via Traefik para o browser fazer streaming directo
    environment:
      OBJECT_STORAGE_API_KEY: "stub-api-key"
      VAULT_ADDR: "http://vault:8200"
      VAULT_TOKEN: "token-object-storage"
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=main_public-net"
      # O browser acede directamente ao object-storage para streaming de vídeo
      # (Range Requests). O Traefik calcula prioridade automaticamente pelo
      # comprimento da regra — PathPrefix(/objects) ganha ao composer.
      - "traefik.http.routers.object-storage.rule=Host(`uastream.com`) && PathPrefix(`/objects`)"
      - "traefik.http.routers.object-storage.entrypoints=web"
      - "traefik.http.services.object-storage.loadbalancer.server.port=8080"

  # ---------------------------------------------------------------------------
  # Video Editor Stub
  # ---------------------------------------------------------------------------
  video-editor:
    build:
      context: ../video-editor
    networks:
      - services-net   # Só acessível pelo composer — sem acesso ao exterior
    environment:
      VIDEO_EDITOR_API_KEY: "stub-api-key"
      VAULT_ADDR: "http://vault:8200"
      VAULT_TOKEN: "token-video-editor"

  # ---------------------------------------------------------------------------
  # Notifications Stub
  # ---------------------------------------------------------------------------
  notifications:
    build:
      context: ../notifications
    networks:
      - services-net   # Só acessível pelo composer — sem acesso ao exterior
      - public-net     # Exposto via Traefik para links públicos nos emails
    environment:
      NOTIFICATIONS_API_KEY: "stub-api-key"
      DATABASE_URL: "sqlite:////app/notifications.db"
      NOTIFICATIONS_BASE_URL: "http://uastream.com"
      SMTP_HOST: "smtp.gmail.com"
      SMTP_PORT: "587"
      SMTP_USER: "egsnotificationsservice@gmail.com"
      SMTP_PASSWORD: "thockzhzntwjcaxe"
      SMTP_FROM: "egsnotificationsservice@gmail.com"
      SMTP_USE_TLS: "true"
      SMTP_USE_SSL: "false"
      VAULT_ADDR: "http://vault:8200"
      VAULT_TOKEN: "token-notifications"
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=main_public-net"
      - "traefik.http.routers.notifications.rule=Host(`uastream.com`) && PathPrefix(`/notifications`)"
      - "traefik.http.routers.notifications.entrypoints=web"
      - "traefik.http.services.notifications.loadbalancer.server.port=8080"

  # ---------------------------------------------------------------------------
  # HashiCorp Vault — Secrets management (dev mode for demo)
  # ---------------------------------------------------------------------------
  vault:
    image: hashicorp/vault:latest
    cap_add:
      - IPC_LOCK
    command: server -dev -dev-root-token-id=root -dev-listen-address=0.0.0.0:8200
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: root
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
      VAULT_SKIP_MLOCK: "true"
      SKIP_SETCAP: "true"
    volumes:
      - vault-data:/vault/data
    networks:
      - backend-net
      - services-net
    healthcheck:
      test: ["CMD-SHELL", "vault status || true"]
      interval: 5s
      timeout: 5s
      retries: 5

  vault-init:
    image: hashicorp/vault:latest
    cap_add:
      - IPC_LOCK
    entrypoint: ["sh","/vault-init/vault_init.sh"]
    user: "0"
    environment:
      VAULT_ADDR: "http://vault:8200"
      VAULT_TOKEN: "root"
    volumes:
      - ./vault_init.sh:/vault-init/vault_init.sh:ro
      - vault-data:/vault/data
    networks:
      - backend-net
    depends_on:
      vault:
        condition: service_healthy
    restart: "no"

  # ---------------------------------------------------------------------------
  # Prometheus — Métricas Time-Series Database
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:latest
    container_name: main-prometheus-1
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - services-net
    ports:
      - "9090:9090"

  # ---------------------------------------------------------------------------
  # cAdvisor — Container Resource monitoring
  # ---------------------------------------------------------------------------
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: main-cadvisor-1
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    networks:
      - services-net
    ports:
      - "8095:8080"

  # ---------------------------------------------------------------------------
  # Grafana — Visualização de Dashboards
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:latest
    container_name: main-grafana-1
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ./grafana/provisioning/:/etc/grafana/provisioning/
    networks:
      - services-net
      - public-net
    ports:
      - "3000:3000"

# =============================================================================
# Redes
# =============================================================================
networks:
  public-net:
    # Única rede com ligação ao exterior via Traefik.
    # Apenas traefik, composer e keycloak (para OAuth redirect) estão aqui.
    driver: bridge

  composer-db-net:
    # Rede privada entre o composer e a sua base de dados.
    driver: bridge
    internal: true

  keycloak-db-net:
    # Rede privada entre o keycloak e a sua base de dados.
    driver: bridge
    internal: true

  backend-net:
    # Comunicação interna entre composer e keycloak (fetch JWKS, criar utilizadores).
    driver: bridge
    internal: true

  services-net:
    # Comunicação interna entre composer e os serviços stub.
    driver: bridge
    internal: true

volumes:
  pgdata:
  kc-pgdata:
  vault-data:
